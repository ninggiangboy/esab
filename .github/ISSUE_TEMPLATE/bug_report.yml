name: Bug report
description: Report incorrect behavior, a crash, or a regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please search [existing issues](https://github.com/ninggiangboy/esab/issues) before filing a duplicate.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where does the problem show up?
      options:
        - Backend (Java / Spring Boot)
        - Frontend (Vue / Vite)
        - Documentation
        - CI / GitHub Actions
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so someone else can reproduce the issue.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead (errors, logs, screenshots if helpful).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, JDK/Node versions, branch/commit, and relevant config (redact secrets).
      placeholder: |
        - OS:
        - Backend: JDK …, branch …
        - Frontend: Node …, pnpm …
    validations:
      required: false

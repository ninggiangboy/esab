spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/esab}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.data.jdbc: DEBUG
    dev.ngb: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${METRICS_OTLP_URL:http://localhost:14318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${TRACES_OTLP_URL:http://localhost:14318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${LOGS_OTLP_URL:http://localhost:14318/v1/logs}
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Test profile: runs without Config Server; DB URL is set by Testcontainers via @DynamicPropertySource.
# JWT keys: Base64-encoded RSA (PKCS#8 private, X.509 public). Regenerate with:
#   openssl genrsa 2048 > priv.pem
#   openssl pkcs8 -topk8 -nocrypt -in priv.pem -outform DER | base64
#   openssl rsa -in priv.pem -pubout -outform DER | base64
eureka:
  client:
    enabled: false

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

app:
  storage:
    s3:
      bucket: test-bucket
      region: us-east-1
  attachment:
    sweep:
      enabled: false
  security:
    jwt:
      public-key-base64: 
      private-key-base64: 

management:
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    dev.ngb: DEBUG

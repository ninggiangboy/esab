spring:
  application:
    name: app
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
      fail-fast: ${CONFIG_FAIL_FAST:false}
      retry:
        initial-interval: 5000
        max-interval: 30000
        max-attempts: 6

eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  attachment:
    sweep:
      enabled: true
      fixed-delay-ms: 600000
